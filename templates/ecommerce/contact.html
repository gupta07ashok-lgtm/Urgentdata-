<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - UrgentData</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo"><i class="fas fa-rocket"></i> UrgentData</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Get In Touch</h1>
            <p class="dashboard-subtitle">We're here to help</p>
        </div>
    </div>

    <!-- Content -->
    <div class="section">
        <div class="container">
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; max-width: 1000px; margin: 0 auto;">
                <div class="card" style="padding: 2.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">Contact Form</h3>
                    <form>
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Subject</label>
                            <input type="text" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Message</label>
                            <textarea class="form-textarea" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
                <div>
                    <div class="card" style="padding: 2rem; text-align: center; margin-bottom: 1rem;">
                        <div style="font-size: 2rem; color: #00b4d8; margin-bottom: 1rem;"><i class="fas fa-phone"></i></div>
                        <h4>Phone</h4>
                        <p style="color: #7f8c8d;">+91 9876543210</p>
                    </div>
                    <div class="card" style="padding: 2rem; text-align: center; margin-bottom: 1rem;">
                        <div style="font-size: 2rem; color: #00b4d8; margin-bottom: 1rem;"><i class="fas fa-envelope"></i></div>
                        <h4>Email</h4>
                        <p style="color: #7f8c8d;">support@urgentdata.com</p>
                    </div>
                    <div class="card" style="padding: 2rem; text-align: center;">
                        <div style="font-size: 2rem; color: #00b4d8; margin-bottom: 1rem;"><i class="fas fa-map-marker-alt"></i></div>
                        <h4>Location</h4>
                        <p style="color: #7f8c8d;">India</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background: #0f2438; color: white; padding: 2rem; text-align: center; margin-top: 4rem;">
        <p>&copy; 2026 UrgentData. All rights reserved.</p>
    </footer>
</body>
</html>
