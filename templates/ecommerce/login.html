{% extends 'ecommerce/base.html' %}

{% block title %}Login - URGENTDATA{% endblock %}

{% block content %}
<section class="login-section section">
    <div class="container-fluid">
        <div class="login-container">
            <h1>Welcome to URGENTDATA</h1>
            <p>Sign in to your account</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter 10-digit number" required>
                    <span class="error-message" id="mobileError"></span>
                </div>

                <div id="otpSection" class="hidden">
                    <div class="form-group">
                        <label for="otp">Enter OTP</label>
                        <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" maxlength="6">
                        <span class="error-message" id="otpError"></span>
                    </div>
                    <button type="button" id="verifyBtn" class="btn btn-primary btn-block">Verify OTP</button>
                    <button type="button" id="resendBtn" class="btn btn-secondary btn-block">Resend OTP</button>
                </div>

                <div id="submitSection">
                    <button type="submit" id="getOtpBtn" class="btn btn-primary btn-block">Get OTP</button>
                </div>
            </form>

            <div id="loadingSpinner" class="hidden">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>
        </div>
    </div>
</section>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
